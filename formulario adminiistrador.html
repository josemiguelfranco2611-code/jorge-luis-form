<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Administradores</title>
    <link rel="stylesheet" href="css/estilo mform administrador.css">
</head>
<body>

<div class="form-container">
    <h2>Registro de Administrador</h2>

    <form>
        <label>Nombre completo</label>
        <input type="text" placeholder="Ingresa tu nombre" required>

        <label>Correo electrónico</label>
        <input type="email" placeholder="ejemplo@gmail.com" required>

        <label>Usuario</label>
        <input type="text" placeholder="Nombre de usuario" required>

        <label>Contraseña</label>
        <input type="password" placeholder="Contraseña" required>

        <label>Confirmar contraseña</label>
        <input type="password" placeholder="Repite la contraseña" required>

        <button type="submit"><a href="jorgeperfiladm.html">Registrarse</a></button>
    </form>
</div>
</body>
</html>
